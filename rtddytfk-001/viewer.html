<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>FORMA Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d11;font-family:'Inter',system-ui,sans-serif;touch-action:none}
canvas{display:block;position:absolute;inset:0;width:100%!important;height:100%!important;touch-action:none}
.bg{position:absolute;inset:0;z-index:0}
#ld{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0d0d11;transition:opacity .5s}
#ld.out{opacity:0;pointer-events:none}
.ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:#9b8cff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:rgba(255,255,255,.35);font-weight:500;letter-spacing:.04em}
.lerr{font-size:13px;color:#f87171;text-align:center;max-width:300px;line-height:1.7;padding:20px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:12px}
/* Brand top bar */
.topbar{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;padding:0 16px;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);z-index:10;pointer-events:none}
.brand-mark{width:22px;height:22px;background:#7c6aff;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.brand-name{font-size:12px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.7);text-transform:uppercase;margin-left:8px}
.brand-product{font-size:12px;color:rgba(255,255,255,.35);margin-left:6px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Controls bottom */
.controls{position:absolute;bottom:0;left:0;right:0;padding:0 16px clamp(12px,3vw,24px);z-index:10;display:flex;flex-direction:column;align-items:center;gap:10px;background:linear-gradient(to top,rgba(0,0,0,.55),transparent);pointer-events:none}
/* Tool buttons */
.tools{display:flex;align-items:center;gap:8px;pointer-events:all}
.tool-btn{width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);-webkit-tap-highlight-color:transparent}
.tool-btn:active{transform:scale(.92)}
.tool-btn.active{background:rgba(124,106,255,.4);border-color:rgba(124,106,255,.7)}
.tool-btn svg{width:17px;height:17px;fill:none;stroke:rgba(255,255,255,.75);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.tool-btn.active svg{stroke:#fff}
/* Orbit dots */
.dots{display:flex;align-items:center;gap:10px}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .25s}
.dot.on{background:rgba(255,255,255,.8);transform:scale(1.6)}
.hint{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.22)}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<canvas id="c"></canvas>

<div id="ld">
  <div class="ring"></div>
  <div class="ltxt" id="ltxt">Loading product...</div>
</div>

<div class="topbar">
  <div class="brand-mark">F</div>
  <div class="brand-name">Forma</div>
  <div class="brand-product" id="bprod"></div>
</div>

<div class="controls">
  <div class="tools">
    <div class="tool-btn active" id="btnOrbit" onclick="setTool('orbit')" title="Rotate">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3.6 9h16.8M3.6 15h16.8"/><path d="M12 3a15 15 0 0 1 4 9 15 15 0 0 1-4 9M12 3a15 15 0 0 0-4 9 15 15 0 0 0 4 9"/></svg>
    </div>
    <div class="tool-btn" id="btnPan" onclick="setTool('pan')" title="Pan">
      <svg viewBox="0 0 24 24"><path d="M8 3v4M16 3v4M12 3v4M8 17v4M16 17v4M12 17v4M3 8h4M3 16h4M3 12h4M17 8h4M17 16h4M17 12h4"/></svg>
    </div>
    <div class="tool-btn" id="btnReset" onclick="resetCam()" title="Reset view">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </div>
  </div>
  <div class="dots" id="dots"></div>
  <div class="hint" id="hint">Drag to rotate &middot; Scroll to zoom</div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three'
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js'

/* ── Helpers ── */
const $id = id => document.getElementById(id)
const ltxt = $id('ltxt'), ldiv = $id('ld')
function err(m){ ldiv.innerHTML = `<div class="lerr">${m}</div>` }
function step(m){ ltxt.textContent = m }

/* ── Load config ── */
step('Reading config...')
let CFG
try {
  const r = await fetch('./config.json')
  if (!r.ok) throw new Error('HTTP ' + r.status)
  CFG = await r.json()
} catch(e) { err('Cannot load config.json<br><small>' + e.message + '</small>'); throw e }

document.title = CFG.name + ' — FORMA Viewer'
$id('bprod').textContent = '\u00b7 ' + CFG.name

/* ── Renderer ── */
const canvas = $id('c')
const ren = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: 'high-performance' })
ren.shadowMap.enabled = true
ren.shadowMap.type = THREE.PCFSoftShadowMap
ren.toneMapping = THREE.ACESFilmicToneMapping
ren.outputColorSpace = THREE.SRGBColorSpace

const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 2000)

function resize() {
  const w = window.innerWidth, h = window.innerHeight
  ren.setSize(w, h); ren.setPixelRatio(Math.min(devicePixelRatio, 2))
  camera.aspect = w / h; camera.updateProjectionMatrix()
}
resize(); window.addEventListener('resize', resize)

/* ── Background ── */
const bg = CFG.background || {}
const bgEl = $id('bg')
function applyBG() {
  if (bg.mode === 'gradient') {
    ren.setClearColor(0x000000, 0)
    bgEl.style.background = `linear-gradient(${bg.gradientAngle||135}deg,${bg.gradientStart||'#0f0c29'},${bg.gradientEnd||'#24243e'})`
  } else {
    ren.setClearColor(bg.solidColor || '#0e0e14', 1)
    bgEl.style.background = 'transparent'
  }
}
applyBG()

/* ── Lights ── */
const ambLight  = new THREE.AmbientLight(0xffffff, 0.4)
const hemiLight = new THREE.HemisphereLight(0xdde0e8, 0xb0a890, 0)
const keyLight  = new THREE.DirectionalLight(0xfff8f0, 3.0)
const fillLight = new THREE.DirectionalLight(0xb0c8ff, 0.8)
keyLight.castShadow = true
keyLight.shadow.mapSize.set(2048, 2048)
keyLight.shadow.bias = -0.0005
const sc = keyLight.shadow.camera
sc.left=-8;sc.right=8;sc.top=8;sc.bottom=-8;sc.near=.1;sc.far=80
scene.add(ambLight, hemiLight, keyLight, fillLight)

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.ShadowMaterial({ opacity: 0.2, transparent: true })
)
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground)

function kelvin(k) {
  const t=k/100; let r,g,b
  if(t<=66){r=255;g=Math.max(0,Math.min(255,99.47*Math.log(t)-161.12));b=t<=19?0:Math.max(0,Math.min(255,138.52*Math.log(t-10)-305.04))}
  else{r=Math.max(0,Math.min(255,329.7*Math.pow(t-60,-.133)));g=Math.max(0,Math.min(255,288.12*Math.pow(t-60,-.0755)));b=255}
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`
}

function applyLighting(l) {
  if (!l) {
    ren.toneMappingExposure = 2.0
    keyLight.intensity = 3; fillLight.intensity = 0.8; ambLight.intensity = 0.4
    keyLight.position.set(3, 6, 3); return
  }
  const HPRE = [
    {sky:'#dde0e8',gnd:'#b0a890',hI:1,  kI:3,  kT:5500,fI:.8},
    {sky:'#87ceeb',gnd:'#8a7a50',hI:2,  kI:5,  kT:6500,fI:1.2},
    {sky:'#ff6040',gnd:'#40204a',hI:1.2,kI:2,  kT:3200,fI:.4},
    {sky:'#101830',gnd:'#060810',hI:.3, kI:.5, kT:4000,fI:.1},
    {sky:'#c0c8d0',gnd:'#909898',hI:1.8,kI:1.5,kT:7000,fI:1},
    {sky:'#ffa030',gnd:'#604020',hI:1,  kI:3,  kT:2700,fI:.5},
  ]
  if (l.mode === 'hdri' && l.hdriPreset >= 0 && l.hdriPreset < HPRE.length) {
    const h = HPRE[l.hdriPreset]
    ren.toneMappingExposure = 1.5
    hemiLight.color.set(h.sky); hemiLight.groundColor.set(h.gnd); hemiLight.intensity = h.hI
    keyLight.intensity = h.kI; keyLight.color.set(kelvin(h.kT))
    fillLight.intensity = h.fI; ambLight.intensity = 0
  } else {
    hemiLight.intensity = 0
    const br = l.brightness ?? 5
    ren.toneMappingExposure = Math.pow(br / 5, 1.5) * 2.0 + 0.08
    keyLight.intensity  = br * 0.8 + 0.2
    fillLight.intensity = br * 0.2 + 0.05
    ambLight.intensity  = br * 0.05 + 0.02
    keyLight.color.set(kelvin(l.keyTemp ?? 5500))
    fillLight.color.set(0xb0c8ff)
  }
  if (ground?.material) ground.material.opacity = l.shadowOpacity ?? 0.2
  const az = (l.azimuth ?? 45) * Math.PI / 180
  const el = (l.elevation ?? 35) * Math.PI / 180
  const d = 8
  keyLight.position.set(d*Math.sin(az)*Math.cos(el), d*Math.sin(el), d*Math.cos(az)*Math.cos(el))
}
applyLighting(CFG.lighting)

/* ── Load model ── */
step('Loading model...')
const modelFile = CFG.model?.file || 'model.obj'
let modelBlob
try {
  const r = await fetch('./' + modelFile)
  if (!r.ok) throw new Error('HTTP ' + r.status)
  modelBlob = await r.blob()
} catch(e) { err('Cannot load model: ' + modelFile + '<br><small>' + e.message + '</small>'); throw e }

const objUrl = URL.createObjectURL(modelBlob)
let obj
try { obj = await new OBJLoader().loadAsync(objUrl) }
catch(e) { err('Error parsing model<br><small>' + e.message + '</small>'); throw e }
finally { URL.revokeObjectURL(objUrl) }

step('Preparing scene...')
obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true } })

const rawBox = new THREE.Box3().setFromObject(obj)
const bsz = new THREE.Vector3(); rawBox.getSize(bsz)
const bc  = new THREE.Vector3(); rawBox.getCenter(bc)
if ((CFG.model?.pivotMode || 'centered') === 'centered') obj.position.sub(bc)
const mx = Math.max(bsz.x, bsz.y, bsz.z)
obj.scale.setScalar(mx > 0 ? 2 / mx : 1)
scene.add(obj)

const wBox = new THREE.Box3().setFromObject(obj)
const wCenter = new THREE.Vector3(); wBox.getCenter(wCenter)
const radius  = wBox.getBoundingSphere(new THREE.Sphere()).radius
ground.position.y = wBox.min.y - 0.02

/* ── Apply material ── */
const TX = new THREE.TextureLoader()
async function loadTex(path) {
  if (!path || path.startsWith('blob:')) return null
  try {
    const r = await fetch(path); if (!r.ok) return null
    const b = await r.blob()
    const u = URL.createObjectURL(b)
    const t = await TX.loadAsync(u); URL.revokeObjectURL(u)
    t.colorSpace = THREE.SRGBColorSpace; t.wrapS = t.wrapT = THREE.RepeatWrapping
    return t
  } catch { return null }
}

const mat = CFG.material || {}
let albTex = null
if (mat.useTexture && mat.albedoTextureUrl && !mat.albedoTextureUrl.startsWith('blob:'))
  albTex = await loadTex(mat.albedoTextureUrl)

if (mat.mode === 'mix') {
  const u = {
    uCA:{value:new THREE.Color(mat.matA?.albedoColor||'#1a3a6a')},
    uCB:{value:new THREE.Color(mat.matB?.albedoColor||'#6a1a1a')},
    uMix:{value:mat.mixFactor??0.5},
    uRA:{value:1-(mat.matA?.glossiness??0.8)}, uRB:{value:1-(mat.matB?.glossiness??0.2)},
    uMA:{value:mat.matA?.reflection??0.5},     uMB:{value:mat.matB?.reflection??0.1},
    uHTA:{value:0},uHTB:{value:0},uHTM:{value:0},
    uTA:{value:null},uTB:{value:null},uTM:{value:null},
  }
  const mm = new THREE.ShaderMaterial({ uniforms:u, lights:true, fog:false,
    vertexShader:`varying vec2 vUv;varying vec3 vN,vWP;void main(){vUv=uv;vN=normalize(normalMatrix*normal);vec4 wp=modelMatrix*vec4(position,1.);vWP=wp.xyz;gl_Position=projectionMatrix*viewMatrix*wp;}`,
    fragmentShader:`precision highp float;
    uniform vec3 uCA,uCB;uniform sampler2D uTA,uTB,uTM;
    uniform float uHTA,uHTB,uHTM,uMix,uRA,uRB,uMA,uMB;
    varying vec2 vUv;varying vec3 vN,vWP;
    #include <lights_pars_begin>
    void main(){
      vec3 cA=uHTA>.5?texture2D(uTA,vUv).rgb:uCA;
      vec3 cB=uHTB>.5?texture2D(uTB,vUv).rgb:uCB;
      float f=uHTM>.5?texture2D(uTM,vUv).r:uMix;
      vec3 alb=mix(cA,cB,f);float rough=mix(uRA,uRB,f);float metal=mix(uMA,uMB,f);
      vec3 N=normalize(vN);vec3 col=ambientLightColor*alb*(1.-metal*.5);
      #if NUM_HEMI_LIGHTS>0
      for(int i=0;i<NUM_HEMI_LIGHTS;i++){float h=dot(N,hemisphereLights[i].direction)*.5+.5;col+=mix(hemisphereLights[i].groundColor,hemisphereLights[i].skyColor,h)*alb*(1.-metal*.35);}
      #endif
      #if NUM_DIR_LIGHTS>0
      for(int i=0;i<NUM_DIR_LIGHTS;i++){
        vec3 L=normalize(directionalLights[i].direction);float d=max(dot(N,L),0.);
        col+=directionalLights[i].color*alb*d*(1.-metal*.4);
        if(d>0.){vec3 V=normalize(cameraPosition-vWP);vec3 H=normalize(L+V);float sp=pow(max(dot(N,H),0.),mix(8.,192.,1.-rough));col+=directionalLights[i].color*sp*(metal*.6+.08);}
      }#endif
      col=pow(clamp(col,0.,1.),vec3(1./2.2));gl_FragColor=vec4(col,1.);}
  `})
  obj.traverse(c => {
    if (!c.isMesh) return
    const old = Array.isArray(c.material) ? c.material : [c.material]
    old.forEach(m => m && m.dispose()); c.material = mm
  })
} else {
  obj.traverse(c => {
    if (!c.isMesh) return
    const old = Array.isArray(c.material) ? c.material : [c.material]
    old.forEach(m => m && m.dispose())
    c.material = new THREE.MeshStandardMaterial({
      color: new THREE.Color(mat.albedoColor || '#888888'),
      roughness: Math.max(0.001, 1 - (mat.glossiness ?? 0.55)),
      metalness: Math.max(0, Math.min(1, mat.reflection ?? 0)),
      map: albTex || null,
      envMapIntensity: mat.envMapIntensity ?? 1,
    })
  })
}

/* ── Spherical camera state ── */
const CAM = {
  target: wCenter.clone(),
  theta: 0, phi: Math.PI/2, r: 0,
  tTheta: 0, tPhi: Math.PI/2, tR: 0,
  pX: 0, tpX: 0, pY: 0, tpY: 0,
}
;(function initRadius() {
  const fovR = camera.fov * Math.PI / 180
  CAM.r = CAM.tR = radius / Math.sin(Math.min(fovR/2, Math.atan(camera.aspect)*fovR/2)) * 1.4
})()

function camTick() {
  const lf = 0.1
  CAM.theta += (CAM.tTheta - CAM.theta) * lf
  CAM.phi   += (CAM.tPhi   - CAM.phi)   * lf
  CAM.r     += (CAM.tR     - CAM.r)     * lf
  CAM.pX    += (CAM.tpX    - CAM.pX)    * lf
  CAM.pY    += (CAM.tpY    - CAM.pY)    * lf
  const x = CAM.r * Math.sin(CAM.phi) * Math.sin(CAM.theta)
  const y = CAM.r * Math.cos(CAM.phi)
  const z = CAM.r * Math.sin(CAM.phi) * Math.cos(CAM.theta)
  const et = new THREE.Vector3(CAM.target.x + CAM.pX, CAM.target.y + CAM.pY, CAM.target.z)
  camera.position.set(et.x+x, et.y+y, et.z+z); camera.lookAt(et)
}

function doPan(dx, dy) {
  const scale = CAM.r * 0.002
  const dir = new THREE.Vector3(
    Math.sin(CAM.phi)*Math.sin(CAM.theta),
    Math.cos(CAM.phi),
    Math.sin(CAM.phi)*Math.cos(CAM.theta)
  )
  const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0,1,0)).normalize()
  const up    = new THREE.Vector3().crossVectors(right, dir).normalize()
  CAM.tpX -= dx * scale * right.x;  CAM.tpY -= dx * scale * right.y
  CAM.tpX += dy * scale * up.x;     CAM.tpY += dy * scale * up.y
}

function doOrbit(dx, dy) {
  CAM.tTheta -= dx * 0.007
  CAM.tPhi = Math.max(0.05, Math.min(Math.PI - 0.05, CAM.tPhi - dy * 0.006))
}

function doZoom(delta) {
  CAM.tR = Math.max(0.4, Math.min(50, CAM.tR + delta * 0.003 * CAM.tR))
}

window.resetCam = function() { CAM.tTheta=0; CAM.tPhi=Math.PI/2; CAM.tpX=0; CAM.tpY=0 }

/* ── Tool mode ── */
let _tool = 'orbit'
window.setTool = function(t) {
  _tool = t
  $id('btnOrbit').classList.toggle('active', t==='orbit')
  $id('btnPan').classList.toggle('active', t==='pan')
  $id('hint').textContent = t==='pan'
    ? 'Drag to pan \u00b7 Scroll to zoom'
    : 'Drag to rotate \u00b7 Scroll to zoom'
}

/* ── Mouse input ── */
let _dragging = false, _lx = 0, _ly = 0, _isPan = false
canvas.addEventListener('mousedown', e => {
  e.preventDefault()
  _dragging = true; _lx = e.clientX; _ly = e.clientY
  // Right-click or middle-click or Alt = pan always
  _isPan = e.button === 2 || e.button === 1 || e.altKey || _tool === 'pan'
}, { passive: false })
window.addEventListener('mousemove', e => {
  if (!_dragging) return
  const dx = e.clientX - _lx, dy = e.clientY - _ly
  _lx = e.clientX; _ly = e.clientY
  if (_isPan) doPan(dx, dy)
  else doOrbit(dx, dy)
})
window.addEventListener('mouseup', () => _dragging = false)
canvas.addEventListener('wheel', e => { e.preventDefault(); doZoom(e.deltaY) }, { passive: false })
canvas.addEventListener('contextmenu', e => e.preventDefault())

/* ── Touch input ── */
// 1 finger = orbit OR pan (depending on tool)
// 2 fingers = pinch zoom + two-finger pan simultaneously
let _t1x=0, _t1y=0, _pinchDist=null, _p2cx=0, _p2cy=0

canvas.addEventListener('touchstart', e => {
  e.preventDefault()
  if (e.touches.length === 1) {
    _t1x = e.touches[0].clientX; _t1y = e.touches[0].clientY
    _pinchDist = null
  }
  if (e.touches.length === 2) {
    _pinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    )
    _p2cx = (e.touches[0].clientX + e.touches[1].clientX) / 2
    _p2cy = (e.touches[0].clientY + e.touches[1].clientY) / 2
  }
}, { passive: false })

canvas.addEventListener('touchmove', e => {
  e.preventDefault()
  if (e.touches.length === 1 && _pinchDist === null) {
    const dx = e.touches[0].clientX - _t1x
    const dy = e.touches[0].clientY - _t1y
    _t1x = e.touches[0].clientX; _t1y = e.touches[0].clientY
    if (_tool === 'pan') doPan(dx, dy)
    else doOrbit(dx, dy)
  }
  if (e.touches.length >= 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    )
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2
    // Pinch zoom
    if (_pinchDist !== null) doZoom((1 - d / _pinchDist) * CAM.tR * 3)
    // Two-finger pan
    const dpx = cx - _p2cx, dpy = cy - _p2cy
    if (Math.abs(dpx) > 0.5 || Math.abs(dpy) > 0.5) doPan(dpx, dpy)
    _pinchDist = d; _p2cx = cx; _p2cy = cy
  }
}, { passive: false })

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) _pinchDist = null
}, { passive: true })

/* ── Orbit indicator dots ── */
const dotsEl = $id('dots')
const NUM_DOTS = 8
dotsEl.innerHTML = Array.from({length:NUM_DOTS},(_,i)=>`<div class="dot" id="vtd${i}"></div>`).join('')
const dotEls = Array.from({length:NUM_DOTS},(_,i)=>$id('vtd'+i))

/* ── Render loop ── */
function loop() {
  requestAnimationFrame(loop)
  camTick()
  // Update dot indicator
  const normAngle = ((-CAM.theta * 180 / Math.PI) % 360 + 360) % 360
  const activeIdx = Math.round(normAngle / (360/NUM_DOTS)) % NUM_DOTS
  dotEls.forEach((d, i) => d.classList.toggle('on', i === activeIdx))
  ren.render(scene, camera)
}
loop()

// Hide loading
setTimeout(() => ldiv.classList.add('out'), 250)
