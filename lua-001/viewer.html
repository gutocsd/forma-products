<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>FORMA Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d11;font-family:'Inter',system-ui,sans-serif;touch-action:none}
canvas{display:block;position:absolute;inset:0;width:100%!important;height:100%!important;touch-action:none}
.bg{position:absolute;inset:0;z-index:0}
/* Loading */
#ld{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0d0d11;transition:opacity .5s}
#ld.out{opacity:0;pointer-events:none}
.ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:#9b8cff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:.04em}
.lerr{font-size:13px;color:#f87171;text-align:center;max-width:280px;line-height:1.8;padding:16px 20px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:12px}
/* Brand top */
.topbar{position:absolute;top:0;left:0;right:0;height:48px;display:flex;align-items:center;padding:0 16px;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);z-index:10;pointer-events:none}
.bmark{width:20px;height:20px;background:#7c6aff;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.bname{font-size:11px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-left:8px}
.bsep{color:rgba(255,255,255,.2);margin:0 5px;font-size:11px}
.bprod{font-size:11px;color:rgba(255,255,255,.35);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── CONTROL BAR ── */
.ctrl-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(255,255,255,.07);
  padding:14px clamp(14px,4vw,32px) clamp(14px,3vw,22px);
  display:flex;flex-direction:column;gap:10px;
}
/* Pan button row */
.bar-row{display:flex;align-items:center;gap:10px}
.pan-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.6);font-size:12px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;transition:all .2s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  flex-shrink:0;
}
.pan-btn:active{transform:scale(.95)}
.pan-btn.on{
  background:rgba(124,106,255,.3);border-color:rgba(124,106,255,.6);
  color:#c0b4ff;
}
.pan-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.bar-hint{flex:1;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.22);text-align:right}
/* Rotation slider */
.orbit-track{
  position:relative;height:28px;display:flex;align-items:center;
  cursor:ew-resize;-webkit-tap-highlight-color:transparent;touch-action:none;
}
.orbit-rail{position:absolute;left:0;right:0;height:2px;background:rgba(255,255,255,.16);border-radius:2px}
.orbit-thumb{
  position:absolute;top:50%;width:18px;height:18px;margin-top:-9px;margin-left:-9px;
  border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.5);
  pointer-events:none;transition:background .2s;
}
.orbit-track.pan-mode .orbit-thumb{background:rgba(255,255,255,.3)}
.orbit-label{font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.2);text-align:center}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<canvas id="c"></canvas>
<div id="ld"><div class="ring"></div><div class="ltxt" id="ltxt">Loading...</div></div>
<div class="topbar">
  <div class="bmark">F</div>
  <div class="bname">Forma</div>
  <div class="bsep">·</div>
  <div class="bprod" id="bprod"></div>
</div>
<div class="ctrl-bar">
  <div class="bar-row">
    <button class="pan-btn" id="panBtn" onclick="togglePan()">
      <svg viewBox="0 0 24 24"><path d="M9 3v9M6 6V5a3 3 0 0 1 6 0v4"/><path d="M12 5a3 3 0 0 1 6 0v7a6 6 0 0 1-12 0V9a3 3 0 0 1 3-3"/></svg>
      <span id="panLbl">Pan</span>
    </button>
    <div class="bar-hint" id="barHint">Scroll to zoom</div>
  </div>
  <div class="orbit-track" id="orbitTrack">
    <div class="orbit-rail"></div>
    <div class="orbit-thumb" id="orbitThumb" style="left:50%"></div>
  </div>
  <div class="orbit-label">← Drag to rotate 360°</div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three'
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js'

const $=id=>document.getElementById(id)
const ltxt=$('ltxt'),ldiv=$('ld')
function err(m){ldiv.innerHTML=`<div class="lerr">${m}</div>`}
function step(m){ltxt.textContent=m}

/* ── Load config ── */
step('Reading config...')
let CFG
try{
  const r=await fetch('./config.json');if(!r.ok)throw new Error('HTTP '+r.status)
  CFG=await r.json()
}catch(e){err('Cannot load config.json<br><small>'+e.message+'</small>');throw e}

document.title=CFG.name+' — FORMA'
$('bprod').textContent=CFG.name

/* ── Renderer ── */
const canvas=$('c')
const ren=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,powerPreference:'high-performance'})
ren.shadowMap.enabled=true;ren.shadowMap.type=THREE.PCFSoftShadowMap
ren.toneMapping=THREE.ACESFilmicToneMapping
ren.outputColorSpace=THREE.SRGBColorSpace
const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(45,1,.01,2000)
function resize(){
  const w=window.innerWidth,h=window.innerHeight
  ren.setSize(w,h);ren.setPixelRatio(Math.min(devicePixelRatio,2))
  camera.aspect=w/h;camera.updateProjectionMatrix()
}
resize();window.addEventListener('resize',resize)

/* ── Background ── */
const bg=CFG.background||{}
;(function applyBG(){
  if(bg.mode==='gradient'){ren.setClearColor(0,0);$('bg').style.background=`linear-gradient(${bg.gradientAngle||135}deg,${bg.gradientStart||'#0f0c29'},${bg.gradientEnd||'#24243e'})`}
  else{ren.setClearColor(bg.solidColor||'#0e0e14',1);$('bg').style.background='transparent'}
})()

/* ── Lights ── */
const ambLight=new THREE.AmbientLight(0xffffff,.2)
const hemiLight=new THREE.HemisphereLight(0xffffff,0x888888,1.5)
const keyLight=new THREE.DirectionalLight(0xfff8f0,2.5)
const fillLight=new THREE.DirectionalLight(0xc0d4ff,.8)
const rimLight=new THREE.DirectionalLight(0xffffff,.35)
keyLight.castShadow=true;keyLight.shadow.mapSize.set(2048,2048);keyLight.shadow.bias=-.0003
const ksc=keyLight.shadow.camera;ksc.left=-6;ksc.right=6;ksc.top=6;ksc.bottom=-6;ksc.near=.1;ksc.far=60
fillLight.position.set(-4,3,-3);rimLight.position.set(0,2,-8)
scene.add(ambLight,hemiLight,keyLight,fillLight,rimLight)
const ground=new THREE.Mesh(new THREE.PlaneGeometry(60,60),new THREE.ShadowMaterial({opacity:.15,transparent:true}))
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground)

function kelvin(k){
  const t=k/100;let r,g,b
  if(t<=66){r=255;g=Math.max(0,Math.min(255,99.47*Math.log(t)-161.12));b=t<=19?0:Math.max(0,Math.min(255,138.52*Math.log(t-10)-305.04))}
  else{r=Math.max(0,Math.min(255,329.7*Math.pow(t-60,-.133)));g=Math.max(0,Math.min(255,288.12*Math.pow(t-60,-.0755)));b=255}
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`
}

/* ── Default IBL (RoomEnvironment) ── */
let _defEnv=null
import('three/addons/environments/RoomEnvironment.js').then(({RoomEnvironment})=>{
  const pmrem=new THREE.PMREMGenerator(ren);pmrem.compileEquirectangularShader()
  _defEnv=pmrem.fromScene(new RoomEnvironment(.5)).texture
  scene.environment=_defEnv;pmrem.dispose()
}).catch(()=>{})

function applyLighting(l){
  if(!l){ren.toneMappingExposure=1.5;return}
  if(l.mode==='hdri'&&l.hdriUrl){
    // Load HDRI for IBL reflections
    import('three/addons/loaders/RGBELoader.js').then(({RGBELoader})=>{
      new RGBELoader().load(l.hdriUrl,tex=>{
        const pmrem=new THREE.PMREMGenerator(ren);pmrem.compileEquirectangularShader()
        const envMap=pmrem.fromEquirectangular(tex).texture
        scene.environment=envMap;pmrem.dispose();tex.dispose()
        ren.toneMappingExposure=Math.max(.5,l.hdriIntensity??1.5)
        hemiLight.intensity=0;keyLight.intensity=0;fillLight.intensity=0;ambLight.intensity=.05
        scene.traverse(c=>{if(c.isMesh&&c.material&&!c.material._isMix){c.material.envMap=envMap;c.material.needsUpdate=true}})
      },undefined,()=>{})
    }).catch(()=>{})
    return
  }
  const v=l.intensity??5
  ren.toneMappingExposure=v===0?0:Math.pow(v/5,2)*1.5+0.1
  hemiLight.color.set(0xffffff);hemiLight.groundColor.set(0x777777);hemiLight.intensity=1.4
  keyLight.intensity=2.0;keyLight.color.set(kelvin(l.keyTemp??5500))
  fillLight.intensity=0.7;fillLight.color.set(0xc8d8ff)
  rimLight.intensity=0.3;ambLight.intensity=0.15
  const az=(l.azimuth??45)*Math.PI/180,el=(l.elevation??35)*Math.PI/180,d=8
  keyLight.position.set(d*Math.sin(az)*Math.cos(el),d*Math.sin(el),d*Math.cos(az)*Math.cos(el))
  if(ground?.material)ground.material.opacity=l.shadowOpacity??0.15
}
applyLighting(CFG.lighting)

/* ── Load model ── */
step('Loading model...')
const modelFile=CFG.model?.file||'model.obj'
let mBlob
try{const r=await fetch('./'+modelFile);if(!r.ok)throw new Error('HTTP '+r.status);mBlob=await r.blob()}
catch(e){err('Cannot load model<br><small>'+e.message+'</small>');throw e}
const mUrl=URL.createObjectURL(mBlob)
let obj
try{obj=await new OBJLoader().loadAsync(mUrl)}
catch(e){err('Error parsing model<br><small>'+e.message+'</small>');throw e}
finally{URL.revokeObjectURL(mUrl)}

step('Building scene...')
obj.traverse(c=>{if(c.isMesh){c.castShadow=true;c.receiveShadow=true}})
const rawBox=new THREE.Box3().setFromObject(obj)
const bsz=new THREE.Vector3();rawBox.getSize(bsz)
const bc=new THREE.Vector3();rawBox.getCenter(bc)
if((CFG.model?.pivotMode||'centered')==='centered')obj.position.sub(bc)
const mx=Math.max(bsz.x,bsz.y,bsz.z);obj.scale.setScalar(mx>0?2/mx:1)
scene.add(obj)
const wBox=new THREE.Box3().setFromObject(obj)
const wCenter=new THREE.Vector3();wBox.getCenter(wCenter)
const radius=wBox.getBoundingSphere(new THREE.Sphere()).radius
ground.position.y=wBox.min.y-.02

/* ── Apply material ── */
const TX=new THREE.TextureLoader()
async function loadTex(path){
  if(!path||path.startsWith('blob:'))return null
  try{
    const r=await fetch(path);if(!r.ok)return null
    const b=await r.blob();const u=URL.createObjectURL(b)
    const t=await TX.loadAsync(u);URL.revokeObjectURL(u)
    t.colorSpace=THREE.SRGBColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping
    return t
  }catch{return null}
}
const mat=CFG.material||{}
let albTex=null
if(mat.useTexture&&mat.albedoTextureUrl)albTex=await loadTex(mat.albedoTextureUrl)

const envMap=scene.environment||null
if(mat.mode==='mix'){
  const u={
    uCA:{value:new THREE.Color(mat.matA?.albedoColor||'#1a3a6a')},
    uCB:{value:new THREE.Color(mat.matB?.albedoColor||'#6a1a1a')},
    uMix:{value:mat.mixFactor??0.5},
    uRA:{value:1-(mat.matA?.glossiness??0.8)},uRB:{value:1-(mat.matB?.glossiness??0.2)},
    uMA:{value:mat.matA?.reflection??0.5},uMB:{value:mat.matB?.reflection??0.1},
    uHTA:{value:0},uHTB:{value:0},uHTM:{value:0},
    uTA:{value:null},uTB:{value:null},uTM:{value:null},
  }
  // Load mix textures
  if(mat.matA?.textureUrl){const t=await loadTex(mat.matA.textureUrl);if(t){u.uTA.value=t;u.uHTA.value=1}}
  if(mat.matB?.textureUrl){const t=await loadTex(mat.matB.textureUrl);if(t){u.uTB.value=t;u.uHTB.value=1}}
  if(mat.maskTextureUrl){const t=await loadTex(mat.maskTextureUrl);if(t){u.uTM.value=t;u.uHTM.value=1}}
  const mm=new THREE.ShaderMaterial({uniforms:u,lights:true,fog:false,
    vertexShader:`varying vec2 vUv;varying vec3 vN,vWP;void main(){vUv=uv;vN=normalize(normalMatrix*normal);vec4 wp=modelMatrix*vec4(position,1.);vWP=wp.xyz;gl_Position=projectionMatrix*viewMatrix*wp;}`,
    fragmentShader:`precision highp float;
    uniform vec3 uCA,uCB;uniform sampler2D uTA,uTB,uTM;uniform float uHTA,uHTB,uHTM,uMix,uRA,uRB,uMA,uMB;
    varying vec2 vUv;varying vec3 vN,vWP;
    #include <lights_pars_begin>
    void main(){
      vec3 cA=uHTA>.5?texture2D(uTA,vUv).rgb:uCA;vec3 cB=uHTB>.5?texture2D(uTB,vUv).rgb:uCB;
      float f=uHTM>.5?texture2D(uTM,vUv).r:uMix;
      vec3 alb=mix(cA,cB,f);float rough=mix(uRA,uRB,f);float metal=mix(uMA,uMB,f);
      vec3 N=normalize(vN);vec3 col=ambientLightColor*alb*(1.-metal*.5);
      #if NUM_HEMI_LIGHTS>0
      for(int i=0;i<NUM_HEMI_LIGHTS;i++){float h=dot(N,hemisphereLights[i].direction)*.5+.5;col+=mix(hemisphereLights[i].groundColor,hemisphereLights[i].skyColor,h)*alb*(1.-metal*.35);}
      #endif
      #if NUM_DIR_LIGHTS>0
      for(int i=0;i<NUM_DIR_LIGHTS;i++){vec3 L=normalize(directionalLights[i].direction);float d=max(dot(N,L),0.);col+=directionalLights[i].color*alb*d*(1.-metal*.4);if(d>0.){vec3 V=normalize(cameraPosition-vWP);vec3 H=normalize(L+V);float sp=pow(max(dot(N,H),0.),mix(8.,192.,1.-rough));col+=directionalLights[i].color*sp*(metal*.6+.08);}}
      #endif
      col=pow(clamp(col,0.,1.),vec3(1./2.2));gl_FragColor=vec4(col,1.);}
  `})
  mm._isMix=true
  obj.traverse(c=>{if(!c.isMesh)return;const old=Array.isArray(c.material)?c.material:[c.material];old.forEach(m=>m&&m.dispose());c.material=mm})
}else{
  obj.traverse(c=>{
    if(!c.isMesh)return
    const old=Array.isArray(c.material)?c.material:[c.material];old.forEach(m=>m&&m.dispose())
    c.material=new THREE.MeshStandardMaterial({
      color:albTex?new THREE.Color(0xffffff):new THREE.Color(mat.albedoColor||'#888888'),
      roughness:Math.max(.001,1-(mat.glossiness??0.55)),
      metalness:Math.max(0,Math.min(1,mat.reflection??0)),
      map:albTex||null,
      envMap:envMap,
      envMapIntensity:mat.envMapIntensity??1,
    })
  })
}

/* ── Camera state ── */
const CAM={
  target:wCenter.clone(),
  theta:0,phi:Math.PI/2,r:0,
  tTheta:0,tPhi:Math.PI/2,tR:0,
  pX:0,tpX:0,pY:0,tpY:0,
}
;(()=>{const fovR=camera.fov*Math.PI/180;CAM.r=CAM.tR=radius/Math.sin(Math.min(fovR/2,Math.atan(camera.aspect)*fovR/2))*1.4})()

function camTick(){
  const lf=.1
  CAM.theta+=(CAM.tTheta-CAM.theta)*lf;CAM.phi+=(CAM.tPhi-CAM.phi)*lf
  CAM.r+=(CAM.tR-CAM.r)*lf;CAM.pX+=(CAM.tpX-CAM.pX)*lf;CAM.pY+=(CAM.tpY-CAM.pY)*lf
  const x=CAM.r*Math.sin(CAM.phi)*Math.sin(CAM.theta)
  const y=CAM.r*Math.cos(CAM.phi)
  const z=CAM.r*Math.sin(CAM.phi)*Math.cos(CAM.theta)
  const et=new THREE.Vector3(CAM.target.x+CAM.pX,CAM.target.y+CAM.pY,CAM.target.z)
  camera.position.set(et.x+x,et.y+y,et.z+z);camera.lookAt(et)
}
function doPan(dx,dy){
  const s=CAM.r*.002
  const dir=new THREE.Vector3(Math.sin(CAM.phi)*Math.sin(CAM.theta),Math.cos(CAM.phi),Math.sin(CAM.phi)*Math.cos(CAM.theta))
  const right=new THREE.Vector3().crossVectors(dir,new THREE.Vector3(0,1,0)).normalize()
  const up=new THREE.Vector3().crossVectors(right,dir).normalize()
  CAM.tpX-=dx*s*right.x;CAM.tpY-=dx*s*right.y
  CAM.tpX+=dy*s*up.x;CAM.tpY+=dy*s*up.y
}

/* ── Pan mode ── */
let _panMode=false
window.togglePan=function(){
  _panMode=!_panMode
  $('panBtn').classList.toggle('on',_panMode)
  $('panLbl').textContent=_panMode?'Pan ON':'Pan'
  $('barHint').textContent=_panMode?'Drag to pan · Scroll to zoom':'Scroll to zoom'
  $('orbitTrack').classList.toggle('pan-mode',_panMode)
}

/* ── Canvas interactions (pan only — no orbit on canvas) ── */
let _cdrag=false,_clx=0,_cly=0
canvas.addEventListener('mousedown',e=>{if(_panMode){e.preventDefault();_cdrag=true;_clx=e.clientX;_cly=e.clientY}},{passive:false})
window.addEventListener('mousemove',e=>{if(!_cdrag)return;doPan(e.clientX-_clx,e.clientY-_cly);_clx=e.clientX;_cly=e.clientY})
window.addEventListener('mouseup',()=>_cdrag=false)
canvas.addEventListener('wheel',e=>{e.preventDefault();CAM.tR=Math.max(.4,Math.min(50,CAM.tR+e.deltaY*.003*CAM.tR))},{passive:false})
canvas.addEventListener('contextmenu',e=>e.preventDefault())

/* ── Mobile: pan touch on canvas ── */
let _ct1x=0,_ct1y=0,_ctouching=false
canvas.addEventListener('touchstart',e=>{
  if(_panMode&&e.touches.length===1){e.preventDefault();_ctouching=true;_ct1x=e.touches[0].clientX;_ct1y=e.touches[0].clientY}
},{passive:false})
canvas.addEventListener('touchmove',e=>{
  if(_ctouching&&_panMode&&e.touches.length===1){
    e.preventDefault()
    doPan(e.touches[0].clientX-_ct1x,e.touches[0].clientY-_ct1y)
    _ct1x=e.touches[0].clientX;_ct1y=e.touches[0].clientY
  }
},{passive:false})
canvas.addEventListener('touchend',()=>_ctouching=false,{passive:true})

/* ── Pinch zoom (mobile) ── */
let _lpd=null,_lp2cx=0,_lp2cy=0
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    e.preventDefault()
    _lpd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)
    _lp2cx=(e.touches[0].clientX+e.touches[1].clientX)/2;_lp2cy=(e.touches[0].clientY+e.touches[1].clientY)/2
  }
},{passive:false})
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length>=2){
    e.preventDefault()
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)
    if(_lpd!==null)CAM.tR=Math.max(.4,Math.min(50,CAM.tR*(_lpd/d)))
    _lpd=d
  }
},{passive:false})
canvas.addEventListener('touchend',e=>{if(e.touches.length<2)_lpd=null},{passive:true})

/* ── Rotation slider ── */
const orbitTrack=$('orbitTrack'),orbitThumb=$('orbitThumb')
let _slDragging=false,_slStartX=0,_slStartTheta=0

function getW(){return orbitTrack.getBoundingClientRect().width||window.innerWidth}
function updateThumb(){
  const norm=(((-CAM.tTheta)%(Math.PI*2))+Math.PI*2)%(Math.PI*2)
  orbitThumb.style.left=(norm/(Math.PI*2)*100)+'%'
}

// Mouse drag on slider
orbitTrack.addEventListener('mousedown',e=>{
  e.preventDefault();e.stopPropagation()
  _slDragging=true;_slStartX=e.clientX;_slStartTheta=CAM.tTheta
},{passive:false})
window.addEventListener('mousemove',e=>{
  if(!_slDragging)return
  CAM.tTheta=_slStartTheta-(e.clientX-_slStartX)/getW()*Math.PI*2
})
window.addEventListener('mouseup',()=>_slDragging=false)

// Touch drag on slider
let _slTStartX=0,_slTStartTheta=0,_slTActive=false
orbitTrack.addEventListener('touchstart',e=>{
  e.preventDefault();e.stopPropagation()
  if(e.touches.length===1){_slTActive=true;_slTStartX=e.touches[0].clientX;_slTStartTheta=CAM.tTheta}
},{passive:false})
orbitTrack.addEventListener('touchmove',e=>{
  e.preventDefault();e.stopPropagation()
  if(_slTActive&&e.touches.length===1)
    CAM.tTheta=_slTStartTheta-(e.touches[0].clientX-_slTStartX)/getW()*Math.PI*2
},{passive:false})
orbitTrack.addEventListener('touchend',()=>_slTActive=false,{passive:true})

/* ── Render loop ── */
