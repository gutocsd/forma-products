<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FORMA Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d11;font-family:'Inter',system-ui,sans-serif}
#c{display:block;position:absolute;inset:0;width:100%;height:100%}
.bg{position:absolute;inset:0;z-index:0;transition:background .6s}
/* Loading */
#loading{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#0d0d11;transition:opacity .5s}
#loading.out{opacity:0;pointer-events:none}
.ring{width:44px;height:44px;border:3px solid rgba(255,255,255,.1);border-top-color:#9b8cff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:.04em}
.lerr{font-size:13px;color:#f87171;text-align:center;max-width:300px;line-height:1.7;padding:20px}
/* Brand */
.brand{position:absolute;top:0;left:0;right:0;height:56px;display:flex;align-items:center;padding:0 24px;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent);z-index:10;pointer-events:none}
.brand-mark{width:24px;height:24px;background:#7c6aff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.brand-name{font-size:13px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.85);text-transform:uppercase;margin-left:9px}
.brand-product{font-size:13px;color:rgba(255,255,255,.4);margin-left:6px}
/* Bottom */
.bottom{position:absolute;bottom:0;left:0;right:0;padding:0 0 28px;z-index:10;display:flex;flex-direction:column;align-items:center;gap:12px;background:linear-gradient(to top,rgba(0,0,0,.45),transparent);pointer-events:none}
.hint{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.orb-track{width:180px;height:2px;background:rgba(255,255,255,.12);border-radius:2px;position:relative}
.orb-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.35);transition:left .06s linear}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<canvas id="c"></canvas>
<div id="loading"><div class="ring"></div><div class="ltxt" id="ltxt">Loading product…</div></div>
<div class="brand">
  <div class="brand-mark">F</div>
  <div class="brand-name">Forma</div>
  <div class="brand-product" id="brandProduct"></div>
</div>
<div class="bottom">
  <div class="orb-track"><div class="orb-thumb" id="orbt" style="left:50%"></div></div>
  <div class="hint">Drag to rotate · Scroll to zoom</div>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three'
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js'

const ltxt = document.getElementById('ltxt')
const ldiv = document.getElementById('loading')
const bgEl = document.getElementById('bg')

function err(msg){ ldiv.innerHTML='<div class="lerr">'+msg+'</div>' }
function step(msg){ ltxt.textContent = msg }

/* ── Load config ── */
step('Reading config…')
let CFG
try {
  const r = await fetch('./config.json')
  if(!r.ok) throw new Error('HTTP '+r.status)
  CFG = await r.json()
} catch(e) {
  err('Could not load config.json<br>Make sure it is in the same folder as viewer.html<br><small>'+e.message+'</small>')
  throw e
}
document.title = CFG.name + ' — FORMA Viewer'
document.getElementById('brandProduct').textContent = '· ' + CFG.name

/* ── Apply background early ── */
const bg = CFG.background || {}
if(bg.mode === 'gradient') {
  bgEl.style.background = `linear-gradient(${bg.gradientAngle||135}deg,${bg.gradientStart||'#0f0c29'},${bg.gradientEnd||'#24243e'})`
} else {
  bgEl.style.background = bg.solidColor || '#0e0e14'
}

/* ── Three.js setup ── */
const canvas = document.getElementById('c')
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true, powerPreference:'high-performance'})
renderer.shadowMap.enabled = true
renderer.shadowMap.type = THREE.PCFSoftShadowMap
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.0
renderer.outputColorSpace = THREE.SRGBColorSpace

const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 2000)

function resize() {
  const w = window.innerWidth, h = window.innerHeight
  renderer.setSize(w, h)
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
  camera.aspect = w/h
  camera.updateProjectionMatrix()
}
resize()
window.addEventListener('resize', resize)

/* ── Lights ── */
const ambLight = new THREE.AmbientLight(0xffffff, 0.3)
const hemiLight = new THREE.HemisphereLight(0xdde0e8, 0xb0a890, 0)
const keyLight  = new THREE.DirectionalLight(0xfff8f0, 2.0)
const fillLight = new THREE.DirectionalLight(0xb0c8ff, 0.6)
keyLight.castShadow = true
keyLight.shadow.mapSize.set(2048,2048)
keyLight.shadow.bias = -0.0005
scene.add(ambLight, hemiLight, keyLight, fillLight)

/* ── Ground ── */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60,60),
  new THREE.ShadowMaterial({opacity:.25, transparent:true})
)
ground.rotation.x = -Math.PI/2
ground.receiveShadow = true
scene.add(ground)

/* ── Apply lighting from config ── */
function applyLighting(l) {
  if(!l) return
  if(l.mode === 'hdri' && l.hdriPreset >= 0) {
    const skyColors = ['#dde0e8','#87ceeb','#ff6040','#101830','#c0c8d0','#ffa030']
    const gndColors = ['#b0a890','#8a7a50','#40204a','#060810','#909898','#604020']
    const hIs = [1.0, 2.0, 1.2, 0.3, 1.8, 1.0]
    const kIs = [2.5, 4.5, 2.0, 0.5, 1.2, 2.8]
    const kTs = [5500, 6500, 3200, 4000, 7000, 2700]
    const i = l.hdriPreset
    hemiLight.color.set(skyColors[i]||'#dde0e8')
    hemiLight.groundColor.set(gndColors[i]||'#b0a890')
    hemiLight.intensity = hIs[i]||1
    keyLight.intensity = kIs[i]||2
    keyLight.color.set(kelvin(kTs[i]||5500))
    fillLight.intensity = (kIs[i]||2)*0.25
  } else {
    hemiLight.intensity = 0
    keyLight.intensity = l.keyIntensity ?? 2.0
    keyLight.color.set(kelvin(l.keyTemp ?? 5500))
    fillLight.intensity = l.fillIntensity ?? 0.6
    ambLight.intensity = l.ambientIntensity ?? 0.3
  }
  const az = (l.azimuth??45)*Math.PI/180
  const el = (l.elevation??35)*Math.PI/180
  const d = 8
  keyLight.position.set(d*Math.sin(az)*Math.cos(el), d*Math.sin(el), d*Math.cos(az)*Math.cos(el))
  if(ground.material) ground.material.opacity = l.shadowOpacity ?? 0.25
}

function kelvin(k) {
  const t=k/100; let r,g,b
  if(t<=66){r=255;g=Math.max(0,Math.min(255,99.47*Math.log(t)-161.12));b=t<=19?0:Math.max(0,Math.min(255,138.52*Math.log(t-10)-305.04))}
  else{r=Math.max(0,Math.min(255,329.7*Math.pow(t-60,-.133)));g=Math.max(0,Math.min(255,288.12*Math.pow(t-60,-.0755)));b=255}
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`
}

applyLighting(CFG.lighting)

/* ── Load model ── */
step('Loading 3D model…')
const modelFile = CFG.model?.file || 'model.obj'
let modelBlob
try {
  const r = await fetch('./' + modelFile)
  if(!r.ok) throw new Error('HTTP '+r.status)
  modelBlob = await r.blob()
} catch(e) {
  err('Could not load model file: ' + modelFile + '<br><small>'+e.message+'</small>')
  throw e
}

const modelUrl = URL.createObjectURL(modelBlob)
let obj
try {
  obj = await new OBJLoader().loadAsync(modelUrl)
} catch(e) {
  err('Error parsing model.<br><small>'+e.message+'</small>')
  throw e
} finally {
  URL.revokeObjectURL(modelUrl)
}

/* ── Process model ── */
step('Preparing scene…')

// Setup meshes
obj.traverse(c => { if(c.isMesh){ c.castShadow=true; c.receiveShadow=true } })

// Bounding box
const rawBox = new THREE.Box3().setFromObject(obj)
const bbSize = new THREE.Vector3(); rawBox.getSize(bbSize)
const bbCenter = new THREE.Vector3(); rawBox.getCenter(bbCenter)

// Pivot
const pivotMode = CFG.model?.pivotMode || 'centered'
if(pivotMode === 'centered') obj.position.sub(bbCenter)

// Scale to 2 units max
const maxD = Math.max(bbSize.x, bbSize.y, bbSize.z)
obj.scale.setScalar(maxD > 0 ? 2/maxD : 1)

scene.add(obj)

// World BB after transform
const wBox = new THREE.Box3().setFromObject(obj)
const wCenter = new THREE.Vector3(); wBox.getCenter(wCenter)
const wRadius = wBox.getBoundingSphere(new THREE.Sphere()).radius

// Ground at base
ground.position.y = wBox.min.y - 0.02

/* ── Apply material ── */
const texLoader = new THREE.TextureLoader()
const texCache = new Map()

async function loadTexture(path) {
  if(!path) return null
  if(texCache.has(path)) return texCache.get(path)
  try {
    const r = await fetch(path)
    if(!r.ok) return null
    const blob = await r.blob()
    const url = URL.createObjectURL(blob)
    const tex = await texLoader.loadAsync(url)
    URL.revokeObjectURL(url)
    tex.colorSpace = THREE.SRGBColorSpace
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping
    texCache.set(path, tex)
    return tex
  } catch { return null }
}

const mat = CFG.material || {}
let albedoTex = null
if(mat.useTexture && mat.albedoTextureUrl && !mat.albedoTextureUrl.startsWith('blob:')) {
  albedoTex = await loadTexture(mat.albedoTextureUrl)
}

function applySimpleMat() {
  const rough = Math.max(0.001, 1 - (mat.glossiness ?? 0.55))
  const metal = Math.max(0, Math.min(1, mat.reflection ?? 0))
  obj.traverse(c => {
    if(!c.isMesh) return
    const old = Array.isArray(c.material) ? c.material : [c.material]
    old.forEach(m => m && m.dispose())
    c.material = new THREE.MeshStandardMaterial({
      color: new THREE.Color(mat.albedoColor || '#2a4a7a'),
      roughness: rough,
      metalness: metal,
      map: albedoTex || null,
      envMapIntensity: mat.envMapIntensity ?? 1.0,
    })
  })
}

if(mat.mode === 'mix') {
  // Mix shader for standalone
  const u = {
    uColorA:{value:new THREE.Color(mat.matA?.albedoColor||'#1a3a6a')},
    uColorB:{value:new THREE.Color(mat.matB?.albedoColor||'#6a1a1a')},
    uMix:{value:mat.mixFactor??0.5},
    uRoughA:{value:1-(mat.matA?.glossiness??0.8)},
    uRoughB:{value:1-(mat.matB?.glossiness??0.2)},
    uMetalA:{value:mat.matA?.reflection??0.5},
    uMetalB:{value:mat.matB?.reflection??0.1},
    uHasTexA:{value:0},uHasTexB:{value:0},uHasMask:{value:0},
    uTexA:{value:null},uTexB:{value:null},uMask:{value:null},
  }
  const mixMat = new THREE.ShaderMaterial({uniforms:u,lights:true,fog:false,
    vertexShader:`varying vec2 vUv;varying vec3 vN,vWP;void main(){vUv=uv;vN=normalize(normalMatrix*normal);vec4 wp=modelMatrix*vec4(position,1.0);vWP=wp.xyz;gl_Position=projectionMatrix*viewMatrix*wp;}`,
    fragmentShader:`precision highp float;
    uniform vec3 uColorA,uColorB;uniform sampler2D uTexA,uTexB,uMask;
    uniform float uHasMask,uHasTexA,uHasTexB,uMix,uRoughA,uRoughB,uMetalA,uMetalB;
    varying vec2 vUv;varying vec3 vN,vWP;
    #include <lights_pars_begin>
    void main(){
      vec3 cA=uHasTexA>.5?texture2D(uTexA,vUv).rgb:uColorA;
      vec3 cB=uHasTexB>.5?texture2D(uTexB,vUv).rgb:uColorB;
      float f=uHasMask>.5?texture2D(uMask,vUv).r:uMix;
      vec3 alb=mix(cA,cB,f);float rough=mix(uRoughA,uRoughB,f);float metal=mix(uMetalA,uMetalB,f);
      vec3 N=normalize(vN);vec3 col=ambientLightColor*alb*(1.-metal*.5);
      #if NUM_HEMI_LIGHTS>0
      for(int i=0;i<NUM_HEMI_LIGHTS;i++){float h=dot(N,hemisphereLights[i].direction)*.5+.5;col+=mix(hemisphereLights[i].groundColor,hemisphereLights[i].skyColor,h)*alb*(1.-metal*.35);}
      #endif
      #if NUM_DIR_LIGHTS>0
      for(int i=0;i<NUM_DIR_LIGHTS;i++){
        vec3 L=normalize(directionalLights[i].direction);float NdL=max(dot(N,L),.0);
        col+=directionalLights[i].color*alb*NdL*(1.-metal*.4);
        if(NdL>.0){vec3 V=normalize(cameraPosition-vWP);vec3 H=normalize(L+V);float sp=pow(max(dot(N,H),.0),mix(8.,192.,1.-rough));col+=directionalLights[i].color*sp*(metal*.6+.08);}
      }#endif
      col=pow(clamp(col,0.,1.),vec3(1./2.2));gl_FragColor=vec4(col,1.0);}
  `})
  obj.traverse(c=>{if(c.isMesh){const old=Array.isArray(c.material)?c.material:[c.material];old.forEach(m=>m&&m.dispose());c.material=mixMat}})
} else {
  applySimpleMat()
}

/* ── Spherical Camera ── */
const sc = {
  target: wCenter.clone(),
  theta: 0, phi: Math.PI/2, radius: 0,
  tTheta: 0, tPhi: Math.PI/2, tRadius: 0,
  panX: 0, tPanX: 0, panY: 0, tPanY: 0
}

// Fit to view
const fovR = camera.fov * Math.PI/180
sc.radius = sc.tRadius = wRadius / Math.sin(Math.min(fovR/2, Math.atan(camera.aspect)*fovR/2)) * 1.35

function camUpdate() {
  const x = sc.radius*Math.sin(sc.phi)*Math.sin(sc.theta)
  const y = sc.radius*Math.cos(sc.phi)
  const z = sc.radius*Math.sin(sc.phi)*Math.cos(sc.theta)
  const et = new THREE.Vector3(sc.target.x+sc.panX, sc.target.y+sc.panY, sc.target.z)
  camera.position.set(et.x+x, et.y+y, et.z+z)
  camera.lookAt(et)
}

/* ── Controls ── */
let drag=false, lx=0, ly=0
canvas.addEventListener('mousedown', e=>{drag=true;lx=e.clientX;ly=e.clientY;e.preventDefault()})
window.addEventListener('mousemove', e=>{
  if(!drag) return
  const dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY
  sc.tTheta -= dx*0.008
  sc.tPhi = Math.max(0.05, Math.min(Math.PI-0.05, sc.tPhi - dy*0.007))
})
window.addEventListener('mouseup', ()=>drag=false)
canvas.addEventListener('wheel', e=>{
  e.preventDefault()
  sc.tRadius = Math.max(0.5, Math.min(50, sc.tRadius + e.deltaY*0.003*sc.tRadius))
},{passive:false})
// Touch
let ltx=0, lty=0, lpd=null
canvas.addEventListener('touchstart', e=>{if(e.touches.length===1){ltx=e.touches[0].clientX;lty=e.touches[0].clientY}},{passive:true})
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)
    if(lpd) sc.tRadius = Math.max(0.5,Math.min(50,sc.tRadius+(lpd-d)*0.008*sc.tRadius))
    lpd=d
  } else {
    lpd=null
    const dx=e.touches[0].clientX-ltx, dy=e.touches[0].clientY-lty
    ltx=e.touches[0].clientX; lty=e.touches[0].clientY
    sc.tTheta -= dx*0.008
    sc.tPhi = Math.max(0.05, Math.min(Math.PI-0.05, sc.tPhi-dy*0.007))
  }
},{passive:true})
canvas.addEventListener('touchend', ()=>lpd=null)

/* ── Render loop ── */
const orbt = document.getElementById('orbt')
function loop() {
  requestAnimationFrame(loop)
  const lf = 0.1
  sc.theta += (sc.tTheta-sc.theta)*lf
  sc.phi   += (sc.tPhi-sc.phi)*lf
  sc.radius+= (sc.tRadius-sc.radius)*lf
  sc.panX  += (sc.tPanX-sc.panX)*lf
  sc.panY  += (sc.tPanY-sc.panY)*lf
  camUpdate()
  const deg = (((sc.theta/(Math.PI*2)*360)%360)+360)%360
  orbt.style.left = (deg/360*100)+'%'
  renderer.render(scene, camera)
}
loop()

/* ── Background renderer sync ── */
if(bg.mode === 'gradient') {
  renderer.setClearColor(0x000000, 0)
} else {
  renderer.setClearColor(bg.solidColor || '#0e0e14', 1)
}

/* ── Hide loading ── */
step('Done')
setTimeout(() => ldiv.classList.add('out'), 200)
</script>
</body>
</html>
